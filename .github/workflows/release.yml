name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Generate icons
        run: |
          mkdir -p src-tauri/icons
          python3 -c "
          import struct, zlib
          def png(w,h,c):
            def ch(t,d):
              r=t+d; return struct.pack('>I',len(d))+r+struct.pack('>I',zlib.crc32(r)&0xffffffff)
            raw=b''.join(b'\x00'+bytes(c)*w for _ in range(h))
            return b'\x89PNG\r\n\x1a\n'+ch(b'IHDR',struct.pack('>IIBBBBB',w,h,8,6,0,0,0))+ch(b'IDAT',zlib.compress(raw))+ch(b'IEND',b'')
          for name,sz in [('icon.png',128),('128x128.png',128),('128x128@2x.png',256),('32x32.png',32)]:
            open(f'src-tauri/icons/{name}','wb').write(png(sz,sz,[137,180,250,255]))
          "

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Stamp version from git tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Stamping version: ${VERSION}"

          # Stamp tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

          # Stamp Cargo.toml
          sed -i "s/^version = .*/version = \"${VERSION}\"/" src-tauri/Cargo.toml

          # Stamp package.json
          npm version "$VERSION" --no-git-tag-version --allow-same-version

          echo "Version stamped in tauri.conf.json, Cargo.toml, and package.json"

      - name: Build release
        run: cargo tauri build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "MDEMG Sidebar v${{ steps.version.outputs.version }}"
          body: |
            ## MDEMG Linux Sidebar v${{ steps.version.outputs.version }}

            ### Installation

            **AppImage** (recommended — works on any Linux distro):
            ```bash
            chmod +x mdemg-sidebar_${{ steps.version.outputs.version }}_amd64.AppImage
            ./mdemg-sidebar_${{ steps.version.outputs.version }}_amd64.AppImage
            ```

            **Debian/Ubuntu (.deb)**:
            ```bash
            sudo dpkg -i mdemg-sidebar_${{ steps.version.outputs.version }}_amd64.deb
            ```

            ### Requirements
            - Linux desktop environment (GNOME, KDE, XFCE, etc.)
            - MDEMG server running on localhost:9999
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          draft: false
          prerelease: false
