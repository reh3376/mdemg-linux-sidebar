name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Create build prerequisites
        run: |
          mkdir -p dist
          cp src/index.html dist/
          mkdir -p src-tauri/icons
          python3 -c "
          import struct, zlib
          def png(w,h,c):
            def ch(t,d):
              r=t+d; return struct.pack('>I',len(d))+r+struct.pack('>I',zlib.crc32(r)&0xffffffff)
            raw=b''.join(b'\x00'+bytes(c)*w for _ in range(h))
            return b'\x89PNG\r\n\x1a\n'+ch(b'IHDR',struct.pack('>IIBBBBB',w,h,8,6,0,0,0))+ch(b'IDAT',zlib.compress(raw))+ch(b'IEND',b'')
          for name,sz in [('icon.png',128),('128x128.png',128),('128x128@2x.png',256),('32x32.png',32)]:
            open(f'src-tauri/icons/{name}','wb').write(png(sz,sz,[137,180,250,255]))
          "

      - name: Install Tauri CLI (v1.x for Tauri 1.x project)
        run: cargo install tauri-cli --version "^1"

      - name: Build
        run: cargo tauri build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdemg-sidebar-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
