<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDEMG Sidebar</title>
    <style>
        :root {
            --bg-primary: #1e1e2e;
            --bg-secondary: #313244;
            --bg-surface: #45475a;
            --text-primary: #cdd6f4;
            --text-secondary: #a6adc8;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --warning: #f9e2af;
            --error: #f38ba8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 16px;
            user-select: none;
        }
        h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        .tab {
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        .tab.active {
            background: var(--accent);
            color: var(--bg-primary);
        }
        .card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .card h3 {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.online { background: var(--success); }
        .status-dot.offline { background: var(--error); }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
        .metric-value { color: var(--accent); font-weight: 500; }
        #content { min-height: 400px; }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <h1>
        <span class="status-dot offline" id="status-dot"></span>
        MDEMG Sidebar
    </h1>

    <div class="tabs">
        <button class="tab active" data-tab="status">Status</button>
        <button class="tab" data-tab="memory">Memory</button>
        <button class="tab" data-tab="learning">Learning</button>
        <button class="tab" data-tab="neo4j">Neo4j</button>
        <button class="tab" data-tab="config">Config</button>
        <button class="tab" data-tab="logs">Logs</button>
        <button class="tab" data-tab="rsic">RSIC</button>
    </div>

    <div id="content">
        <div class="loading">Connecting to MDEMG server...</div>
    </div>

    <script type="module">
        // Sidebar app will poll MDEMG server and render tabs
        // Full implementation will use @tauri-apps/api for HTTP and filesystem access

        const tabs = document.querySelectorAll('.tab');
        const content = document.getElementById('content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadTab(tab.dataset.tab);
            });
        });

        async function checkHealth() {
            try {
                const resp = await fetch('http://localhost:9999/healthz');
                if (resp.ok) {
                    document.getElementById('status-dot').classList.replace('offline', 'online');
                    return true;
                }
            } catch (e) {
                document.getElementById('status-dot').classList.replace('online', 'offline');
            }
            return false;
        }

        async function loadTab(name) {
            content.innerHTML = '<div class="loading">Loading...</div>';
            const online = await checkHealth();
            if (!online) {
                content.innerHTML = '<div class="card"><h3>Server Offline</h3><p>MDEMG server is not running on localhost:9999</p></div>';
                return;
            }
            // Tab content will be loaded from MDEMG API endpoints
            content.innerHTML = `<div class="card"><h3>${name}</h3><p>Tab content loading...</p></div>`;
        }

        // Initial check
        checkHealth().then(online => {
            if (online) loadTab('status');
        });

        // Poll every 5 seconds
        setInterval(checkHealth, 5000);
    </script>
</body>
</html>
